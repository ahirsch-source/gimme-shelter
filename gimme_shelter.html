<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimme Shelter 🛡️</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --olive: #4a5240;
            --olive-dark: #2e3329;
            --olive-light: #6b7260;
            --khaki: #c8b878;
            --khaki-light: #e8d8a0;
            --alert: #d94f2a;
            --alert-dark: #b03a1e;
            --safe: #3a7d44;
            --bg: #1a1e16;
            --surface: #252a20;
            --surface2: #2e3329;
            --border: #3d4438;
            --text: #e8e4d8;
            --text-muted: #9a9888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--olive-dark);
            border-bottom: 3px solid var(--khaki);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(200,184,120,0.03) 10px,
                rgba(200,184,120,0.03) 20px
            );
        }

        .header-icon {
            font-size: 2.8rem;
            filter: drop-shadow(0 0 12px rgba(217,79,42,0.5));
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(217,79,42,0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(217,79,42,0.8)); }
        }

        .header-text h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--khaki);
            line-height: 1;
        }

        .header-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .alert-banner {
            background: var(--alert);
            color: white;
            text-align: center;
            padding: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            display: none;
        }

        /* ── Layout ── */
        .app {
            display: grid;
            grid-template-columns: 380px 1fr;
            height: calc(100vh - 85px);
        }

        .sidebar {
            background: var(--surface);
            overflow-y: auto;
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: var(--surface); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        #map {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ── Sections ── */
        .section {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--khaki);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Buttons ── */
        .btn {
            width: 100%;
            padding: 11px 16px;
            border: none;
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: var(--alert);
            color: white;
        }
        .btn-primary:hover { background: var(--alert-dark); transform: translateY(-1px); }

        .btn-safe {
            background: var(--safe);
            color: white;
        }
        .btn-safe:hover { background: #2e6337; transform: translateY(-1px); }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--olive); }

        .btn-danger {
            background: transparent;
            color: var(--alert);
            border: 1px solid var(--alert);
        }
        .btn-danger:hover { background: rgba(217,79,42,0.15); }

        /* ── Form ── */
        .form-group { margin-bottom: 12px; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 9px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--khaki);
        }

        .form-group input::placeholder { color: var(--text-muted); }

        .file-label {
            display: block;
            padding: 9px 12px;
            background: var(--surface2);
            border: 1px dashed var(--border);
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .file-label:hover { border-color: var(--khaki); color: var(--khaki); }

        .file-name {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: center;
        }

        /* ── Shelter list ── */
        .shelter-list { padding: 0 20px 20px; }

        .shelter-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .shelter-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--olive-light);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .shelter-item:hover {
            border-left-color: var(--khaki);
            background: var(--olive-dark);
            transform: translateX(3px);
        }

        .shelter-item.nearest {
            border-left-color: var(--alert);
            background: rgba(217,79,42,0.08);
        }

        .shelter-item h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--khaki-light);
            margin-bottom: 3px;
        }

        .shelter-item p {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .shelter-item .capacity {
            display: inline-block;
            background: var(--olive);
            color: var(--khaki-light);
            font-size: 0.72rem;
            padding: 2px 7px;
            border-radius: 2px;
            margin-top: 5px;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.05em;
        }

        .delete-btn {
            background: transparent;
            color: var(--alert);
            border: none;
            cursor: pointer;
            font-size: 0.78rem;
            padding: 3px 6px;
            border-radius: 3px;
            float: right;
            margin-top: -2px;
        }
        .delete-btn:hover { background: rgba(217,79,42,0.2); }

        /* ── Route info ── */
        .route-card {
            background: var(--olive-dark);
            border: 1px solid var(--khaki);
            border-radius: 4px;
            padding: 14px;
            margin-top: 10px;
        }

        .route-card h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--khaki);
            margin-bottom: 8px;
        }

        .route-card p {
            font-size: 0.88rem;
            color: var(--text);
            margin: 4px 0;
        }

        .route-card strong { color: var(--khaki-light); }

        .urgent {
            color: var(--alert) !important;
            font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem !important;
        }

        /* ── Loading ── */
        .loading-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px 30px;
            border-radius: 6px;
            color: var(--text-muted);
            z-index: 1000;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.1em;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: 45vh auto;
                height: auto;
                min-height: calc(100vh - 85px);
            }

            /* Map goes first on mobile */
            #map {
                grid-row: 1;
                height: 45vh;
            }

            .sidebar {
                grid-row: 2;
                height: auto;
                border-right: none;
                border-top: 2px solid var(--border);
            }

            .header-text h1 { font-size: 1.5rem; }
        }

        /* ── Leaflet overrides ── */
        .leaflet-popup-content-wrapper {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 4px !important;
            color: var(--text) !important;
        }
        .leaflet-popup-tip { background: var(--surface) !important; }
        .leaflet-popup-content strong { color: var(--khaki-light); }

        .shelter-icon { font-size: 22px; line-height: 1; }
        .user-icon { font-size: 22px; line-height: 1; }

        .btn-pin-active {
            background: var(--khaki) !important;
            color: var(--olive-dark) !important;
            border: 2px solid var(--khaki-light) !important;
            animation: pin-pulse 1.2s ease-in-out infinite;
        }
        @keyframes pin-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(200,184,120,0.5); }
            50% { box-shadow: 0 0 0 6px rgba(200,184,120,0); }
        }
        #map.pin-mode { cursor: crosshair !important; }
        #map.pin-mode .leaflet-interactive { cursor: crosshair !important; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">🛡️</div>
    <div class="header-text">
        <h1>Gimme Shelter</h1>
        <p>Ra'anana · Air Raid Shelter Locator</p>
    </div>
</div>

<div class="alert-banner" id="alertBanner">⚠️ ALERT ACTIVE — FIND NEAREST SHELTER IMMEDIATELY ⚠️</div>

<div class="app">
    <!-- MAP FIRST in DOM so it renders first on mobile -->
    <div id="map">
        <div class="loading-message" id="loadingMessage">🛡️ Loading map...</div>
    </div>

    <div class="sidebar">

        <!-- Location + Find -->
        <div class="section">
            <div class="section-title">🎯 Your Location</div>
            <button class="btn btn-primary" id="getCurrentLocation">📍 Use My GPS Location</button>
            <button class="btn btn-secondary" id="dropPinMode">🗺️ Drop Pin on Map</button>
            <button class="btn btn-safe" id="findNearest">🛡️ Find Nearest Shelter</button>
            <div id="routeInfo"></div>
        </div>

        <!-- Add Shelter -->
        <div class="section">
            <div class="section-title">➕ Add Shelter</div>
            <form id="shelterForm">
                <div class="form-group">
                    <label>Shelter Name / Location</label>
                    <input type="text" id="shelterName" placeholder="e.g., City Hall Basement" required>
                </div>
                <div class="form-group">
                    <label>Latitude</label>
                    <input type="number" id="latitude" step="any" placeholder="e.g., 32.1842" required>
                </div>
                <div class="form-group">
                    <label>Longitude</label>
                    <input type="number" id="longitude" step="any" placeholder="e.g., 34.8736" required>
                </div>
                <div class="form-group">
                    <label>Capacity (optional)</label>
                    <input type="text" id="capacity" placeholder="e.g., 50 people">
                </div>
                <div class="form-group">
                    <label>Photo</label>
                    <input type="file" id="shelterPhoto" accept="image/*" style="display:none">
                    <label for="shelterPhoto" class="file-label">📷 Choose Photo</label>
                    <div class="file-name" id="fileName">No file chosen</div>
                </div>
                <button type="submit" class="btn btn-safe">Add Shelter</button>
            </form>
        </div>

        <!-- Import / Export -->
        <div class="section">
            <div class="section-title">📂 Data</div>
            <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">
                CSV columns: <code style="background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:0.78rem;">name, latitude, longitude, capacity, photo_filename</code>
            </p>

            <!-- Single CSV button — opens picker and imports immediately -->
            <input type="file" id="csvFile" accept=".csv" style="display:none">
            <button class="btn btn-secondary" id="csvImportBtn">📋 Import CSV</button>

            <!-- Bulk photos matching CSV photo_filename column -->
            <input type="file" id="bulkPhotos" accept="image/*" multiple style="display:none">
            <button class="btn btn-secondary" id="bulkPhotosBtn">🖼️ Upload Photos</button>
            <div class="file-name" id="bulkPhotosCount"></div>

            <button class="btn btn-secondary" id="exportBtn">💾 Export JSON</button>
            <input type="file" id="jsonFile" accept=".json" style="display:none">
            <button class="btn btn-secondary" id="jsonImportBtn">📥 Import JSON</button>
            <div class="file-name" id="jsonFileName"></div>
            <button class="btn btn-danger" id="clearAllBtn">🗑️ Clear All Shelters</button>
        </div>

        <!-- Shelter list -->
        <div class="shelter-list">
            <div class="section-title" style="margin-bottom:10px;">🗺️ Shelters</div>
            <div class="shelter-count" id="shelterCount"></div>
            <div id="shelterList"></div>
        </div>

    </div><!-- end sidebar -->
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Pre-loaded shelter data ──────────────────────────────────────────────────
const PRE_LOADED_SHELTERS = [
    { id: 26, name: "Miklat 26", lat: 32.190556, lng: 34.876111, capacity: null, photo: null, _photoFilename: "miklat26.jpeg" },
    { id: 27, name: "Miklat 27", lat: 32.191667, lng: 34.878333, capacity: null, photo: null, _photoFilename: "miklat27.jpeg" },
    { id: 28, name: "Miklat 28", lat: 32.190278, lng: 34.878889, capacity: null, photo: null, _photoFilename: "miklat28.jpeg" },
    { id: 29, name: "Miklat 29", lat: 32.189444, lng: 34.880278, capacity: null, photo: null, _photoFilename: "miklat29.jpeg" },
    { id: 30, name: "Miklat 30", lat: 32.186944, lng: 34.875278, capacity: null, photo: null, _photoFilename: "miklat30.jpeg" },
    { id: 31, name: "Miklat 31", lat: 32.187500, lng: 34.870833, capacity: null, photo: null, _photoFilename: "miklat31.jpeg" },
    { id: 33, name: "Miklat 33", lat: 32.187778, lng: 34.870000, capacity: null, photo: null, _photoFilename: "miklat33.jpeg" },
    { id: 34, name: "Miklat 34", lat: 32.187778, lng: 34.866111, capacity: null, photo: null, _photoFilename: "miklat34.jpeg" },
    { id: 45, name: "Miklat 45", lat: 32.185833, lng: 34.880278, capacity: null, photo: null, _photoFilename: "miklat45.jpeg" },
    { id: 46, name: "Miklat 46", lat: 32.186111, lng: 34.876389, capacity: null, photo: null, _photoFilename: "miklat46.jpeg" },
    { id: 47, name: "Miklat 47", lat: 32.182778, lng: 34.886111, capacity: null, photo: null, _photoFilename: "miklat47.jpeg" },
    { id: 49, name: "Miklat 49", lat: 32.188056, lng: 34.861667, capacity: null, photo: null, _photoFilename: "miklat49.jpeg" },
    { id: 52, name: "Miklat 52", lat: 32.182500, lng: 34.875833, capacity: null, photo: null, _photoFilename: "miklat52.jpeg" }
];
// ────────────────────────────────────────────────────────────────────────────

// ── APP INIT ─────────────────────────────────────────────────────────────────
let initAttempts = 0;

function tryInitialize() {
    initAttempts++;
    if (typeof L !== 'undefined') {
        document.getElementById('loadingMessage').style.display = 'none';
        initializeApp();
    } else if (initAttempts < 20) {
        setTimeout(tryInitialize, 200);
    } else {
        document.getElementById('loadingMessage').innerHTML = 'Error loading map. Please refresh.';
    }
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInitialize);
} else {
    tryInitialize();
}

function initializeApp() {
    const map = L.map('map').setView([32.1842, 34.8736], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    let shelters = [];
    let userLocation = null;
    let userMarker = null;
    let routeLayer = null;
    let shelterMarkers = [];

    // ── Storage ──
    function loadShelters() {
        try {
            const stored = localStorage.getItem('gimmeShelterData');
            if (stored) {
                shelters = JSON.parse(stored);
            } else {
                // First run — seed from pre-loaded data
                shelters = PRE_LOADED_SHELTERS.map(s => ({...s}));
                saveShelters();
            }
            shelters.forEach(s => addShelterToMap(s));
            updateShelterList();
        } catch (e) {
            console.error('Error loading shelters:', e);
            shelters = PRE_LOADED_SHELTERS.map(s => ({...s}));
            shelters.forEach(s => addShelterToMap(s));
            updateShelterList();
        }
    }

    function saveShelters() {
        try {
            localStorage.setItem('gimmeShelterData', JSON.stringify(shelters));
        } catch (e) {
            console.error('Error saving:', e);
        }
    }

    // ── Map markers ──
    function addShelterToMap(shelter) {
        const icon = L.divIcon({
            html: '🛡️',
            className: 'shelter-icon',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        const marker = L.marker([shelter.lat, shelter.lng], { icon }).addTo(map);

        let popup = `<strong>${shelter.name}</strong>`;
        if (shelter.capacity) popup += `<br><span style="color:var(--text-muted);font-size:0.85em">👥 ${shelter.capacity}</span>`;
        if (shelter.photo) popup += `<br><img src="${shelter.photo}" style="width:180px;height:120px;object-fit:cover;margin-top:8px;border-radius:3px;">`;

        marker.bindPopup(popup);
        shelterMarkers.push({ shelter, marker });
    }

    // ── List ──
    function updateShelterList() {
        const listDiv = document.getElementById('shelterList');
        const countDiv = document.getElementById('shelterCount');
        listDiv.innerHTML = '';
        countDiv.textContent = `${shelters.length} shelter${shelters.length !== 1 ? 's' : ''} on map`;

        shelters.forEach(shelter => {
            const div = document.createElement('div');
            div.className = 'shelter-item';
            div.innerHTML = `
                <button class="delete-btn" data-id="${shelter.id}">✕</button>
                <h3>${shelter.name}</h3>
                <p>📍 ${shelter.lat.toFixed(4)}, ${shelter.lng.toFixed(4)}</p>
                ${shelter.capacity ? `<span class="capacity">👥 ${shelter.capacity}</span>` : ''}
                ${shelter.photo ? `<img src="${shelter.photo}" alt="${shelter.name}" style="width:100%;height:110px;object-fit:cover;border-radius:3px;margin-top:8px;">` : ''}
            `;

            div.querySelector('.delete-btn').addEventListener('click', e => {
                e.stopPropagation();
                deleteShelter(shelter.id);
            });

            div.addEventListener('click', () => {
                map.setView([shelter.lat, shelter.lng], 16);
                const m = shelterMarkers.find(m => m.shelter.id === shelter.id);
                if (m) m.marker.openPopup();
            });

            listDiv.appendChild(div);
        });
    }

    function deleteShelter(id) {
        shelters = shelters.filter(s => s.id !== id);
        saveShelters();
        const m = shelterMarkers.find(m => m.shelter.id === id);
        if (m) { map.removeLayer(m.marker); shelterMarkers = shelterMarkers.filter(m => m.shelter.id !== id); }
        updateShelterList();
    }

    // ── File inputs ──
    document.getElementById('shelterPhoto').addEventListener('change', function() {
        document.getElementById('fileName').textContent = this.files[0] ? this.files[0].name : 'No file chosen';
    });

    // ── Add shelter form ──
    document.getElementById('shelterForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('shelterName').value.trim();
        const lat = parseFloat(document.getElementById('latitude').value);
        const lng = parseFloat(document.getElementById('longitude').value);
        const capacity = document.getElementById('capacity').value.trim();
        const photoFile = document.getElementById('shelterPhoto').files[0];

        if (!name || isNaN(lat) || isNaN(lng)) { alert('Please fill in all required fields.'); return; }

        let photoData = null;
        if (photoFile) {
            try { photoData = await fileToBase64(photoFile); } catch (err) { console.error(err); }
        }

        const shelter = { id: Date.now(), name, lat, lng, capacity: capacity || null, photo: photoData };
        shelters.push(shelter);
        saveShelters();
        addShelterToMap(shelter);
        updateShelterList();
        this.reset();
        document.getElementById('fileName').textContent = 'No file chosen';
        alert('Shelter added! 🛡️');
    });

    // ── Location ──
    function setUserLocation(lat, lng) {
        userLocation = { lat, lng };
        if (userMarker) {
            userMarker.off();
            map.removeLayer(userMarker);
            userMarker = null;
        }
        const icon = L.divIcon({ html: '📍', className: 'user-icon', iconSize: [28, 28], iconAnchor: [14, 14] });
        userMarker = L.marker([lat, lng], { icon }).addTo(map);
        userMarker.bindPopup('Your Location');
        userMarker.on('click', function(e) {
            L.DomEvent.stopPropagation(e);
            this.openPopup();
        });
    }

    let gpsWatchId = null;

    document.getElementById('getCurrentLocation').addEventListener('click', function() {
        if (pinModeActive) exitPinMode();
        if (!navigator.geolocation) { alert('Geolocation not supported.'); return; }

        // Cancel any existing watch before starting a new one
        if (gpsWatchId !== null) {
            navigator.geolocation.clearWatch(gpsWatchId);
            gpsWatchId = null;
        }

        this.textContent = '⏳ Getting GPS...';
        this.disabled = true;
        const btn = this;

        gpsWatchId = navigator.geolocation.watchPosition(pos => {
            // Got a fix — immediately cancel the watch, we only need one reading
            navigator.geolocation.clearWatch(gpsWatchId);
            gpsWatchId = null;

            setUserLocation(pos.coords.latitude, pos.coords.longitude);
            map.setView([pos.coords.latitude, pos.coords.longitude], 15);
            btn.textContent = '✅ GPS Location Set';
            btn.disabled = false;
            setTimeout(() => { btn.textContent = '📍 Use My GPS Location'; }, 2500);
        }, () => {
            navigator.geolocation.clearWatch(gpsWatchId);
            gpsWatchId = null;
            btn.textContent = '📍 Use My GPS Location';
            btn.disabled = false;
            alert('Unable to get location. Check your browser settings.');
        }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    });

    // ── Drop-pin mode ──
    let pinModeActive = false;

    const dropPinBtn = document.getElementById('dropPinMode');

    function enterPinMode() {
        pinModeActive = true;
        dropPinBtn.textContent = '✕ Cancel Pin Drop';
        dropPinBtn.classList.add('btn-pin-active');
        document.getElementById('map').classList.add('pin-mode');
    }

    function exitPinMode() {
        pinModeActive = false;
        dropPinBtn.textContent = '🗺️ Drop Pin on Map';
        dropPinBtn.classList.remove('btn-pin-active');
        document.getElementById('map').classList.remove('pin-mode');
    }

    dropPinBtn.addEventListener('click', function() {
        pinModeActive ? exitPinMode() : enterPinMode();
    });

    map.on('click', function(e) {
        if (!pinModeActive) return;
        setUserLocation(e.latlng.lat, e.latlng.lng);
        exitPinMode();
        // Auto-scroll sidebar to Find button on mobile
        document.getElementById('findNearest').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // ── Find nearest ──
    document.getElementById('findNearest').addEventListener('click', async function() {
        if (!userLocation) { alert('Set your location first!'); return; }
        if (shelters.length === 0) { alert('No shelters loaded!'); return; }

        let nearest = null, minDist = Infinity;
        shelters.forEach(s => {
            const d = calcDistance(userLocation.lat, userLocation.lng, s.lat, s.lng);
            if (d < minDist) { minDist = d; nearest = s; }
        });

        if (nearest) {
            // Highlight in list
            document.querySelectorAll('.shelter-item').forEach(el => el.classList.remove('nearest'));
            const route = await getRoute(userLocation, nearest);
            displayRoute(route, nearest, minDist);
        }
    });

    function calcDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000, dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function toRad(d) { return d * Math.PI / 180; }

    async function getRoute(from, to) {
        const url = `https://router.project-osrm.org/route/v1/foot/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            return data.routes[0];
        } catch (e) { return null; }
    }

    function displayRoute(route, shelter, distance) {
        if (routeLayer) map.removeLayer(routeLayer);

        if (route) {
            const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
            routeLayer = L.polyline(coords, { color: '#d94f2a', weight: 5, opacity: 0.8 }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            const walkMin = Math.round(route.duration / 60);
            const distKm = (distance / 1000).toFixed(2);

            document.getElementById('routeInfo').innerHTML = `
                <div class="route-card">
                    <h3>🛡️ ${shelter.name}</h3>
                    <p><strong>Distance:</strong> ${distKm} km</p>
                    <p class="urgent">🚶 ${walkMin} min on foot</p>
                    ${shelter.capacity ? `<p><strong>Capacity:</strong> ${shelter.capacity}</p>` : ''}
                </div>
            `;

            const m = shelterMarkers.find(m => m.shelter.id === shelter.id);
            if (m) m.marker.openPopup();
        } else {
            const distKm = (distance / 1000).toFixed(2);
            const est = Math.round(distance / 83); // ~5 km/h walk
            document.getElementById('routeInfo').innerHTML = `
                <div class="route-card">
                    <h3>🛡️ ${shelter.name}</h3>
                    <p><strong>Distance:</strong> ~${distKm} km</p>
                    <p class="urgent">🚶 ~${est} min on foot (est.)</p>
                </div>
            `;
        }
    }

    // ── CSV import — single button opens picker, imports immediately on selection ──
    let photoMap = {}; // filename → base64, populated by bulk photo upload

    document.getElementById('csvImportBtn').addEventListener('click', () => {
        document.getElementById('csvFile').value = '';
        document.getElementById('csvFile').click();
    });

    document.getElementById('csvFile').addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;
        try {
            const text = await readFileAsText(file);
            const rows = parseCSV(text);
            let added = 0, skipped = 0;
            rows.forEach((row, i) => {
                const lat = parseFloat(row.latitude), lng = parseFloat(row.longitude);
                if (!row.name || isNaN(lat) || isNaN(lng)) { skipped++; return; }
                const filename = (row.photo_filename || '').trim();
                const photo = filename && photoMap[filename] ? photoMap[filename] : null;
                const s = {
                    id: Date.now() + i,
                    name: row.name.trim(),
                    lat, lng,
                    capacity: row.capacity ? row.capacity.trim() : null,
                    photo,
                    _photoFilename: filename || null
                };
                shelters.push(s);
                addShelterToMap(s);
                added++;
            });
            saveShelters();
            updateShelterList();
            this.value = '';
            let msg = `Imported ${added} shelter(s)!`;
            if (skipped) msg += ` (${skipped} rows skipped — missing name or coordinates)`;
            const unmatched = rows.filter(r => r.photo_filename && r.photo_filename.trim() && !photoMap[r.photo_filename.trim()]).length;
            if (unmatched) msg += `\n\n⚠️ ${unmatched} photo(s) not matched. Upload photos first, then re-import CSV.`;
            alert(msg);
        } catch (e) { alert('Error importing CSV: ' + e.message); }
    });

    // ── Bulk photo upload — stores photos in memory keyed by filename ──
    document.getElementById('bulkPhotosBtn').addEventListener('click', () => {
        document.getElementById('bulkPhotos').value = '';
        document.getElementById('bulkPhotos').click();
    });

    document.getElementById('bulkPhotos').addEventListener('change', async function() {
        const files = Array.from(this.files);
        if (!files.length) return;
        let loaded = 0;
        await Promise.all(files.map(async file => {
            try {
                photoMap[file.name] = await fileToBase64(file);
                loaded++;
            } catch (e) { console.error('Photo load error:', file.name, e); }
        }));
        document.getElementById('bulkPhotosCount').textContent =
            `${loaded} photo${loaded !== 1 ? 's' : ''} ready (${Object.keys(photoMap).join(', ')})`;

        // If shelters already loaded from CSV without photos, try to match now
        let matched = 0;
        shelters.forEach(s => {
            // We store the original filename on the shelter object during CSV import
            if (s._photoFilename && photoMap[s._photoFilename] && !s.photo) {
                s.photo = photoMap[s._photoFilename];
                matched++;
                // Update marker popup
                const m = shelterMarkers.find(m => m.shelter.id === s.id);
                if (m) {
                    let popup = `<strong>${s.name}</strong>`;
                    if (s.capacity) popup += `<br><span style="color:var(--text-muted);font-size:0.85em">👥 ${s.capacity}</span>`;
                    popup += `<br><img src="${s.photo}" style="width:180px;height:120px;object-fit:cover;margin-top:8px;border-radius:3px;">`;
                    m.marker.setPopupContent(popup);
                }
            }
        });
        if (matched) { saveShelters(); alert(`Photos loaded! ${matched} shelter(s) updated with photos.`); }
        else { alert(`${loaded} photo(s) loaded and ready. Import your CSV to match them.`); }
    });

    // ── JSON export ──
    document.getElementById('exportBtn').addEventListener('click', function() {
        if (shelters.length === 0) { alert('No shelters to export!'); return; }
        const blob = new Blob([JSON.stringify(shelters, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'gimme_shelter_data.json'; a.click();
        URL.revokeObjectURL(url);
    });

    // ── JSON import ──
    document.getElementById('jsonImportBtn').addEventListener('click', () => document.getElementById('jsonFile').click());

    document.getElementById('jsonFile').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const text = await readFileAsText(file);
            const imported = JSON.parse(text);
            if (!Array.isArray(imported)) { alert('Invalid JSON — expected an array.'); return; }
            let added = 0;
            imported.forEach(s => {
                if (!s.name || s.lat == null || s.lng == null) return;
                if (shelters.find(x => x.id === s.id)) return;
                shelters.push(s);
                addShelterToMap(s);
                added++;
            });
            saveShelters();
            updateShelterList();
            this.value = '';
            document.getElementById('jsonFileName').textContent = '';
            alert(`Imported ${added} shelter(s)!`);
        } catch (err) { alert('Error reading JSON: ' + err.message); }
    });

    // ── Clear all ──
    document.getElementById('clearAllBtn').addEventListener('click', function() {
        if (shelters.length === 0) { alert('Nothing to clear.'); return; }
        if (!confirm(`Delete all ${shelters.length} shelters? This cannot be undone.`)) return;
        shelterMarkers.forEach(m => map.removeLayer(m.marker));
        shelterMarkers = []; shelters = [];
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        document.getElementById('routeInfo').innerHTML = '';
        saveShelters();
        updateShelterList();
    });

    // ── Helpers ──
    function fileToBase64(file) {
        return new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsDataURL(file);
        });
    }

    function readFileAsText(file) {
        return new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsText(file);
        });
    }

    function parseCSV(text) {
        const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).map(line => {
            const vals = line.split(',').map(v => v.trim());
            const obj = {};
            headers.forEach((h, i) => obj[h] = vals[i]);
            return obj;
        });
    }

    loadShelters();
}
</script>
</body>
</html>
